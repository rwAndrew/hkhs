<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F6F8FA">
  <title>港討 HKHS — 小港高中匿名討論區</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== 頂部欄 ===== -->
    <header class="topbar" id="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img class="brand-logo" src="HKHS.png" alt="港討">
          <div class="brand-text">
            <h1>港討</h1>
            <span>小港高中匿名版</span>
          </div>
        </div>
        <button class="icon-btn" id="btn-theme" aria-label="切換深淺色">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>

      <!-- 搜尋列 -->
      <div class="search-wrap">
        <div class="search-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input type="search" id="search-input" placeholder="搜尋貼文、關鍵字…" autocomplete="off">
          <button class="search-clear" id="search-clear" aria-label="清除搜尋">✕</button>
        </div>
      </div>

      <!-- 看板分類 -->
      <nav class="chips" id="chips"></nav>
    </header>

    <!-- ===== 貼文流 ===== -->
    <main class="feed" id="feed"></main>

    <!-- ===== 貼文詳情頁 ===== -->
    <section class="detail-page" id="detail-page" hidden>
      <header class="detail-topbar">
        <button class="icon-btn" id="btn-back" aria-label="返回">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="detail-title">貼文</span>
        <button class="icon-btn detail-share" id="btn-share" aria-label="分享貼文連結">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>
        </button>
      </header>
      <div class="detail-body" id="detail-body"></div>
      <div class="comment-input-bar">
        <input type="text" id="comment-input" placeholder="匿名留言…" maxlength="300" autocomplete="off">
        <button class="send-btn" id="btn-send" aria-label="送出留言">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </div>
    </section>

    <!-- ===== 發文彈窗 ===== -->
    <div class="sheet-backdrop" id="compose-backdrop" hidden></div>
    <section class="compose-sheet" id="compose-sheet" hidden>
      <div class="sheet-handle"></div>
      <div class="compose-head">
        <button class="text-btn" id="btn-compose-cancel">取消</button>
        <span class="compose-title">匿名發文</span>
        <button class="pill-btn small" id="btn-compose-post">發布</button>
      </div>
      <div class="compose-identity" id="compose-identity">
        <span class="identity-avatar" id="identity-avatar">🐬</span>
        <div class="identity-text">
          <strong id="identity-name">匿名海豚</strong>
          <span id="identity-sub">每篇貼文都會隨機分配身分</span>
        </div>
        <button class="icon-btn small" id="btn-shuffle" aria-label="換一個身分">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>
        </button>
      </div>
      <button class="chip as-mod-toggle" id="btn-as-mod" hidden>⚓ 以版主身分發文</button>
      <div class="compose-boards" id="compose-boards"></div>
      <input type="text" class="compose-input-title" id="compose-input-title" placeholder="標題（選填）" maxlength="40" autocomplete="off">
      <textarea class="compose-textarea" id="compose-textarea" placeholder="想說什麼？發文完全匿名，請遵守版規、友善發言 🙌" rows="6" maxlength="2000"></textarea>
      <p class="compose-hint">禁止洩漏他人個資、霸凌、廣告。違規貼文將由版主移除。</p>
    </section>

    <!-- ===== 看板編輯彈窗（版主） ===== -->
    <div class="sheet-backdrop" id="board-backdrop" hidden></div>
    <section class="compose-sheet" id="board-sheet" hidden>
      <div class="sheet-handle"></div>
      <div class="compose-head">
        <button class="text-btn" id="btn-board-cancel">取消</button>
        <span class="compose-title" id="board-sheet-title">編輯看板</span>
        <button class="pill-btn small" id="btn-board-save">儲存</button>
      </div>
      <div class="board-form">
        <label>圖示（emoji）
          <input type="text" id="board-emoji" maxlength="4" placeholder="📋" autocomplete="off">
        </label>
        <label>看板名稱
          <input type="text" id="board-name" maxlength="6" placeholder="例：閒聊" autocomplete="off">
        </label>
        <label>看板說明
          <input type="text" id="board-desc" maxlength="20" placeholder="例：什麼都能聊" autocomplete="off">
        </label>
      </div>
      <button class="danger-btn" id="btn-board-delete" hidden>刪除這個看板</button>
    </section>

    <!-- ===== 底部導覽 ===== -->
    <nav class="tabbar" id="tabbar">
      <button class="tab active" data-tab="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 10 9-7 9 7v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M9 22V12h6v10"/></svg>
        <span>首頁</span>
      </button>
      <button class="tab" data-tab="hot">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        <span>熱門</span>
      </button>
      <button class="tab tab-compose" id="btn-compose" aria-label="發文">
        <div class="compose-fab">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </div>
      </button>
      <button class="tab" data-tab="boards">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>
        <span>看板</span>
      </button>
      <button class="tab" data-tab="about">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span>關於</span>
      </button>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast" hidden></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.6/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
