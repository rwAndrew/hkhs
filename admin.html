<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>版務入口</title>
  <link rel="icon" href="HKHS.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="admin-page">
      <div class="admin-card">
        <img class="brand-logo admin-logo" src="HKHS.png" alt="港討">
        <h1>版務入口</h1>
        <p class="admin-sub">此頁面僅供版主使用</p>

        <div class="admin-field" id="admin-email-field" hidden>
          <input type="email" id="admin-email" placeholder="版主信箱" autocomplete="username">
        </div>
        <div class="admin-field">
          <input type="password" id="admin-pass" placeholder="版主密碼" autocomplete="current-password">
        </div>
        <button class="pill-btn admin-submit" id="btn-admin-login">進入版主模式</button>
        <p class="admin-error" id="admin-error" hidden>登入失敗，請確認帳號密碼</p>

        <a class="admin-back" href="index.html">← 回到港討</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.6/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script>
    // 資料庫模式：用 Supabase Auth（信箱＋密碼，建帳號見 config.js 說明）
    // 展示模式（config.js 未填）：暫時性通行碼 kgsh-demo
    const DEMO_PASS = "kgsh-demo";

    const email = document.getElementById("admin-email");
    const pass = document.getElementById("admin-pass");
    const err = document.getElementById("admin-error");

    if (DB.ready) {
      document.getElementById("admin-email-field").hidden = false;
    } else {
      pass.placeholder = "版主通行碼";
    }

    async function login() {
      if (DB.ready) {
        const { error } = await DB.signIn(email.value.trim(), pass.value);
        if (error) { err.hidden = false; return; }
        location.href = "index.html";
      } else if (pass.value === DEMO_PASS) {
        localStorage.setItem("kgsh-mod", "1");
        location.href = "index.html";
      } else {
        err.hidden = false;
        pass.value = "";
      }
    }

    document.getElementById("btn-admin-login").addEventListener("click", login);
    pass.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    pass.addEventListener("input", () => { err.hidden = true; });

    // 主題跟隨主站設定
    if (localStorage.getItem("kgsh-theme") === "dark" ||
        (!localStorage.getItem("kgsh-theme") && matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.dataset.theme = "dark";
    }
  </script>
</body>
</html>
